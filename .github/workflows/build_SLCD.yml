name: Build SLCD

# ─────────────────────────────────────────────────────────────────────────
# يبني مشروع SLCD المستقل (وحدتا :slcd-app و :core فقط). هذا المستودع
# لا يحتوي على :app أو :admin إطلاقاً — هو نسخة SLCD المفصولة بالكامل.
# ─────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [ main ]
    paths:
      - "slcd-app/**"
      - "core/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - ".github/workflows/build_SLCD.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "slcd-app/**"
      - "core/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
  workflow_dispatch:
    inputs:
      build_type:
        description: "نوع البناء"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release

env:
  GRADLE_VERSION: "8.9"
  JAVA_VERSION: "17"

jobs:
  build:
    name: Build slcd-app (${{ github.event.inputs.build_type || 'debug' }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: إعداد JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: إعداد Android SDK
        uses: android-actions/setup-android@v3

      - name: إعداد Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      # ملاحظة: المستودع لا يحتوي حالياً على gradlew/gradlew.bat مُرفَقين،
      # لذا يُستدعى Gradle مباشرة (عبر setup-gradle أعلاه) بدل ./gradlew.
      # إن أُضيف wrapper لاحقاً، استبدل "gradle" بـ "./gradlew" هنا.

      - name: فحوصات Lint (:slcd-app)
        run: gradle :slcd-app:lintDebug --stacktrace

      - name: اختبارات الوحدة (:slcd-app و :core)
        run: gradle :slcd-app:testDebugUnitTest :core:testDebugUnitTest --stacktrace

      - name: بناء Debug APK
        if: ${{ github.event.inputs.build_type != 'release' }}
        run: gradle :slcd-app:assembleDebug --stacktrace

      - name: فكّ ترميز keystore
        if: ${{ github.event.inputs.build_type == 'release' }}
        run: |
          echo "${{ secrets.SLCD_KEYSTORE_FILE }}" | base64 -d > slcd-app/release.keystore

      - name: بناء Release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        env:
          APP_KEYSTORE_FILE: release.keystore
          APP_KEYSTORE_PASSWORD: ${{ secrets.SLCD_KEYSTORE_PASSWORD }}
          APP_KEY_ALIAS: ${{ secrets.SLCD_KEY_ALIAS }}
          APP_KEY_PASSWORD: ${{ secrets.SLCD_KEY_PASSWORD }}
        run: gradle :slcd-app:assembleRelease --stacktrace

      - name: رفع APK كناتج (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: slcd-app-${{ github.event.inputs.build_type || 'debug' }}-${{ github.sha }}
          path: |
            slcd-app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: حذف ملف keystore المؤقت
        if: ${{ always() && github.event.inputs.build_type == 'release' }}
        run: rm -f slcd-app/release.keystore

      - name: رفع تقرير Lint
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slcd-app-lint-report-${{ github.sha }}
          path: slcd-app/build/reports/lint-results-*.html
          if-no-files-found: ignore
          retention-days: 14
